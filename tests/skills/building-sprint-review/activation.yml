      - building-sprint-review

  - prompt: "plan the next sprint for Unification Charlie"
    activated_skills: []
    not_activated_skills:
      - building-sprint-review

  - prompt: "build an executive update for the LT Connectivity initiative"
    activated_skills: []
    not_activated_skills:
      - building-sprint-review

